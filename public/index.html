<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>PPWNR URL SHORTENER</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#000;color:#33ff99;font-family:'Press Start 2P',monospace;overflow:hidden}

/* CRT */
body::after{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(transparent 0px,transparent 2px,rgba(0,0,0,.35) 3px);pointer-events:none}

/* MATRIX */
canvas{position:fixed;top:0;left:0;width:100%;height:100%;opacity:.14}

/* TERMINAL */
.terminal{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:760px;
max-width:94%;
background:#020202;
padding:28px;
border:4px solid #33ff99;
box-shadow:0 0 10px #33ff99,0 0 40px #33ff9955
}

.title{margin-bottom:18px;font-size:12px}

.output{
min-height:200px;
font-size:11px;
line-height:1.8;
max-height:300px;
overflow-y:auto
}

.line{margin:6px 0;word-break:break-word}

.input-line{display:flex;align-items:center;gap:10px;margin-top:12px}

.prompt{color:#33ff99}

input{
flex:1;
background:none;
border:none;
outline:none;
color:#33ff99;
font-family:'Press Start 2P',monospace;
font-size:11px
}

a{color:#66ccff}

.actions{margin-top:14px;display:flex;flex-wrap:wrap;gap:10px}

button{
background:#001a12;
border:2px solid #33ff99;
color:#33ff99;
font-family:'Press Start 2P',monospace;
font-size:10px;
padding:10px 14px;
cursor:pointer
}

button:hover{background:#33ff99;color:#000}

/* MOBILE */
@media (max-width:768px){

body{overflow:auto}

.terminal{
position:relative;
top:0;
left:0;
transform:none;
width:100%;
height:100vh;
border:none;
padding:20px
}

.title{font-size:10px}

.output{font-size:10px;max-height:55vh}

input{font-size:10px}

button{font-size:9px;padding:12px 14px}

}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="terminal">

<div class="title">
PPWNR URL SHORTENER v1.0
</div>

<div class="output" id="output"></div>

<div class="input-line">
<span class="prompt">></span>
<input id="cmd" placeholder="PASTE URL AND PRESS ENTER" autofocus>
<button id="shortenBtn" type="button">SHORTEN</button>
</div>

</div>

<script>

/* MATRIX */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

let mouse={x:canvas.width/2,y:canvas.height/2}

window.addEventListener("mousemove",e=>{
mouse.x=e.clientX
mouse.y=e.clientY
})

const particles=[]

for(let i=0;i<180;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.6,
vy:(Math.random()-0.5)*0.6,
char:Math.random()>0.5?"0":"1"
})

}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#33ff99"
ctx.font="14px monospace"

ctx.shadowColor="#33ff99"
ctx.shadowBlur=8

particles.forEach(p=>{

const dx=mouse.x-p.x
const dy=mouse.y-p.y

const dist=Math.sqrt(dx*dx+dy*dy)

if(dist<220){
p.vx+=dx*0.0004
p.vy+=dy*0.0004
}

p.x+=p.vx
p.y+=p.vy

p.vx*=0.96
p.vy*=0.96

if(p.x<0)p.x=canvas.width
if(p.x>canvas.width)p.x=0
if(p.y<0)p.y=canvas.height
if(p.y>canvas.height)p.y=0

ctx.fillText(p.char,p.x,p.y)

})

requestAnimationFrame(draw)

}

draw()

/* CLI */

const input=document.getElementById("cmd")
const output=document.getElementById("output")
const shortenBtn=document.getElementById("shortenBtn")

let lastLink=""

function print(text){

const div=document.createElement("div")
div.className="line"
div.innerHTML=text

output.appendChild(div)
output.scrollTop=output.scrollHeight

}

print("SYSTEM READY")
print("PASTE URL AND PRESS ENTER")

async function submitCommand(){

const value=input.value.trim()

if(!value) return

print(`<span class="prompt">></span> ${value}`)

if(value.startsWith("http")){

print("PROCESSING...")

const res=await fetch("/api/shorten",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:value})
})

const data=await res.json()

lastLink=data.shortUrl

print("SHORT LINK CREATED")

print(`
<div>
<a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a>
</div>

<div class="actions">
<button onclick="copyLink()">COPY</button>
<button onclick="openLink()">OPEN</button>
</div>
`)

}

else if(value==="copy"){

if(!lastLink) print("NO LINK")
else{
navigator.clipboard.writeText(lastLink)
print("COPIED")
}

}

else if(value==="open"){

if(lastLink) window.open(lastLink)
else print("NO LINK")

}

else{

print("PASTE URL OR TYPE COPY")

}

input.value=""

}

input.addEventListener("keydown",e=>{

if(e.key==="Enter") submitCommand()

})

shortenBtn.addEventListener("click",()=>{
submitCommand()
})

function copyLink(){
if(!lastLink)return
navigator.clipboard.writeText(lastLink)
print("COPIED TO CLIPBOARD")
}

function openLink(){
if(!lastLink)return
window.open(lastLink)
}

</script>

</body>
</html>
