version: "3"

services:

  nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - api

  api:
    image: node:20
    working_dir: /app
    volumes:
      - ./api:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "888:888"
    depends_on:
      - mariadb
      - redis

  mariadb:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shortener
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"

  redis:
    image: redis:7
    ports:
      - "6379:6379"